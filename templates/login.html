<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Smart Wardrobe</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="logo-section">
            <div class="logo-title">Smart Wardrobe</div>
            <div class="logo-subtitle">Your personal fashion assistant</div>
        </div>
        <form class="auth-form" id="loginForm">
            <h2>Log In</h2>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="you@email.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:16px;">Log In</button>
            <div id="message"></div>
            <div class="auth-switch">Don't have an account? <a href="{{ url_for('register') }}">Sign up here</a></div>
            <div class="auth-switch" style="margin-top:16px;">
                <a href="{{ url_for('welcome') }}" style="color:var(--text-muted);text-decoration:none;">← Back to home</a>
            </div>
        </form>
    </div>
</div>
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const msg = document.getElementById('message');
        msg.innerHTML = '';
        if (!email || !password) { msg.innerHTML = '<div class="message error">Please fill in all fields</div>'; return; }
        try {
            const res  = await fetch('/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email, password}) });
            const data = await res.json();
            if (data.success) {
                msg.innerHTML = '<div class="message success">Login successful! Redirecting...</div>';
                setTimeout(() => window.location.href = '/dashboard', 1000);
            } else {
                msg.innerHTML = `<div class="message error">${data.message}</div>`;
            }
        } catch { msg.innerHTML = '<div class="message error">Connection error. Please try again.</div>'; }
    });
</script>
</body>
</html>
